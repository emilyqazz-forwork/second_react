<!doctype html>
<!-- 이 파일은 브라우저가 처음 읽는 파일이에요. React 앱이 실행되는 껍데기 역할을 해요. -->
<html lang="en">
  <head>
    <!-- 한글 깨짐 방지 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 보이는 아이콘 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- 모바일에서 화면 크기 맞춰주는 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 브라우저 탭에 보이는 제목 -->
    <title>CHICKODE - React Migration</title>
    
    <!-- 코드 에디터(CodeMirror) 기본 스타일 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <!-- 코드 에디터 어두운 테마(darcula) 스타일 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/darcula.min.css">
  </head>
  <body>
    <!-- React가 여기다 화면을 통째로 집어넣어요. 실제로는 비어있어요. -->
    <div id="root"></div>

    <!-- 코드 에디터 본체 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <!-- Java, C, C++ 문법 강조 기능 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <!-- 괄호 자동완성 { 치면 } 자동으로 닫힘 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <!-- 짝이 맞는 괄호 강조해줌 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <!-- React 앱 실행 시작점. type="module"은 import/export 문법을 쓸 수 있게 해줘요. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
